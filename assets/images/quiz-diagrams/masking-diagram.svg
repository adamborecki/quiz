<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="guitarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D8B37" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3D8B37" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#3D8B37" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#3D8B37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3D8B37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pianoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C3D2E" stop-opacity="0"/>
      <stop offset="25%" stop-color="#5C3D2E" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#5C3D2E" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#5C3D2E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5C3D2E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Frequency Masking</text>

  <!-- Grid area -->
  <rect x="60" y="42" width="520" height="210" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Axes -->
  <line x1="60" y1="252" x2="580" y2="252" stroke="#2D2D2D" stroke-width="1.5"/>
  <line x1="60" y1="42" x2="60" y2="252" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="30" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E" transform="rotate(-90,30,150)">Level</text>
  <text x="320" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C3D2E">Frequency (Hz)</text>
  <!-- Freq labels -->
  <text x="90" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">100</text>
  <text x="180" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">250</text>
  <text x="280" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">500</text>
  <text x="380" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">1k</text>
  <text x="470" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">4k</text>
  <text x="550" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">10k</text>

  <!-- Guitar spectrum (green) -->
  <path d="M 60,250 C 80,248 100,240 140,200 C 180,140 220,80 270,65 C 320,55 360,70 400,100 C 440,140 470,200 500,230 C 520,242 540,248 560,250" fill="url(#guitarGrad)" stroke="#3D8B37" stroke-width="2" stroke-linecap="round" fill-opacity="0.6"/>

  <!-- Piano spectrum (brown) -->
  <path d="M 60,250 C 100,248 150,240 200,200 C 250,140 300,85 350,75 C 400,68 430,80 460,100 C 490,130 520,180 550,220 C 560,235 570,245 580,248" fill="url(#pianoGrad)" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round" fill-opacity="0.6"/>

  <!-- Masking zone highlight -->
  <rect x="230" y="50" width="190" height="200" fill="#C0392B" fill-opacity="0.08" rx="4"/>
  <!-- Masking zone hatching -->
  <line x1="230" y1="50" x2="230" y2="250" stroke="#C0392B" stroke-width="1" stroke-dasharray="3,6"/>
  <line x1="420" y1="50" x2="420" y2="250" stroke="#C0392B" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Masking label -->
  <rect x="240" y="152" width="170" height="40" fill="#F5EDE3" fill-opacity="0.92" rx="4" stroke="#C0392B" stroke-width="1.5"/>
  <text x="325" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C0392B" font-weight="bold">Masking Zone</text>
  <text x="325" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">Instruments fight for space here!</text>

  <!-- Legend -->
  <rect x="70" y="55" width="130" height="50" fill="#F5EDE3" fill-opacity="0.9" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <line x1="80" y1="73" x2="105" y2="73" stroke="#3D8B37" stroke-width="2.5"/>
  <rect x="80" y="68" width="25" height="10" fill="#3D8B37" fill-opacity="0.15"/>
  <text x="112" y="77" font-family="system-ui, sans-serif" font-size="11" fill="#3D8B37" font-weight="bold">Guitar</text>
  <line x1="80" y1="93" x2="105" y2="93" stroke="#5C3D2E" stroke-width="2.5"/>
  <rect x="80" y="88" width="25" height="10" fill="#5C3D2E" fill-opacity="0.15"/>
  <text x="112" y="97" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E" font-weight="bold">Piano</text>
</svg>