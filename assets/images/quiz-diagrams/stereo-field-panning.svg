<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Stereo Field &amp; Panning</text>
  <text x="300" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E">Top-down view of the stereo image between two speakers</text>

  <!-- Listener position -->
  <circle cx="300" cy="250" r="14" fill="#5C3D2E" fill-opacity="0.2" stroke="#5C3D2E" stroke-width="1.5"/>
  <!-- Head icon -->
  <circle cx="300" cy="247" r="7" fill="#5C3D2E" fill-opacity="0.5"/>
  <ellipse cx="300" cy="258" rx="5" ry="3" fill="#5C3D2E" fill-opacity="0.3"/>
  <text x="300" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E">Listener</text>

  <!-- Left speaker -->
  <rect x="70" y="65" width="40" height="50" fill="#2D2D2D" rx="5"/>
  <rect x="78" y="73" width="24" height="24" fill="#5C3D2E" rx="12"/>
  <circle cx="90" cy="85" r="8" fill="#E8D5C0"/>
  <circle cx="90" cy="85" r="3" fill="#5C3D2E"/>
  <rect x="78" y="100" width="24" height="8" fill="#5C3D2E" rx="2"/>
  <text x="90" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D">L</text>

  <!-- Right speaker -->
  <rect x="490" y="65" width="40" height="50" fill="#2D2D2D" rx="5"/>
  <rect x="498" y="73" width="24" height="24" fill="#5C3D2E" rx="12"/>
  <circle cx="510" cy="85" r="8" fill="#E8D5C0"/>
  <circle cx="510" cy="85" r="3" fill="#5C3D2E"/>
  <rect x="498" y="100" width="24" height="8" fill="#5C3D2E" rx="2"/>
  <text x="510" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D">R</text>

  <!-- Stereo field arc -->
  <path d="M 90,90 Q 300,60 510,90" fill="none" stroke="#E8D5C0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Sound propagation lines (faded) -->
  <line x1="90" y1="95" x2="300" y2="240" stroke="#E8D5C0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="510" y1="95" x2="300" y2="240" stroke="#E8D5C0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Pan positions -->
  <!-- Left position -->
  <circle cx="130" cy="78" r="10" fill="#C0392B" fill-opacity="0.2" stroke="#C0392B" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#C0392B" font-weight="bold">1</text>

  <!-- Center position -->
  <circle cx="300" cy="68" r="12" fill="#3D8B37" fill-opacity="0.2" stroke="#3D8B37" stroke-width="2"/>
  <text x="300" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#3D8B37" font-weight="bold">2</text>

  <!-- Right position -->
  <circle cx="430" cy="75" r="10" fill="#5C3D2E" fill-opacity="0.2" stroke="#5C3D2E" stroke-width="1.5"/>
  <text x="430" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#5C3D2E" font-weight="bold">3</text>

  <!-- Pan arrow showing movement -->
  <path d="M 145,78 C 200,62 260,60 285,67" fill="none" stroke="#5C3D2E" stroke-width="1.5" marker-end="url(#panArrow)"/>
  <path d="M 315,67 C 340,60 400,62 415,74" fill="none" stroke="#5C3D2E" stroke-width="1.5"/>
  <!-- Arrow heads -->
  <polygon points="283,64 290,67 285,72" fill="#5C3D2E"/>
  <polygon points="413,70 420,74 414,78" fill="#5C3D2E"/>

  <!-- Position labels -->
  <text x="90" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#2D2D2D">Left</text>
  <text x="300" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#2D2D2D" font-weight="bold">Center</text>
  <text x="510" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#2D2D2D">Right</text>

  <!-- Legend -->
  <rect x="140" y="170" width="320" height="55" fill="white" fill-opacity="0.7" rx="6" stroke="#E8D5C0" stroke-width="1"/>
  <circle cx="165" cy="185" r="6" fill="#C0392B" fill-opacity="0.3" stroke="#C0392B" stroke-width="1"/>
  <text x="178" y="189" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">Panned left (more from L speaker)</text>
  <circle cx="165" cy="203" r="6" fill="#3D8B37" fill-opacity="0.3" stroke="#3D8B37" stroke-width="1"/>
  <text x="178" y="207" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">Center (equal from both speakers)</text>
  <circle cx="165" cy="218" r="6" fill="#5C3D2E" fill-opacity="0.3" stroke="#5C3D2E" stroke-width="1"/>
  <text x="178" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">Panned right (more from R speaker)</text>
</svg>