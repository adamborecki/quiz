<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Pan vs Balance</text>

  <!-- LEFT PANEL: Pan -->
  <rect x="15" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#5C3D2E" stroke-width="1.5"/>
  <rect x="15" y="45" width="275" height="30" fill="#5C3D2E" rx="6"/>
  <rect x="15" y="65" width="275" height="10" fill="#5C3D2E"/>
  <text x="152" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#F5EDE3">Pan</text>

  <!-- Mono source -->
  <text x="152" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E">Mono source (single signal)</text>
  <!-- Single dot representing mono -->
  <circle cx="152" cy="125" r="14" fill="#5C3D2E" fill-opacity="0.15" stroke="#5C3D2E" stroke-width="2"/>
  <text x="152" y="129" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-weight="bold">M</text>

  <!-- Arrow showing placement -->
  <path d="M 152,142 L 152,160" stroke="#5C3D2E" stroke-width="1.5"/>
  <polygon points="149,157 152,164 155,157" fill="#5C3D2E"/>
  <text x="152" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-style="italic">Places signal in the stereo field</text>

  <!-- Stereo field representation -->
  <rect x="40" y="188" width="225" height="40" fill="#E8D5C0" fill-opacity="0.5" rx="6" stroke="#E8D5C0" stroke-width="1"/>
  <text x="52" y="212" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2D2D2D">L</text>
  <text x="152" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2D2D2D">C</text>
  <text x="253" y="212" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2D2D2D">R</text>
  <!-- Pan position dot with arrow -->
  <circle cx="195" cy="208" r="8" fill="#C0392B" fill-opacity="0.3" stroke="#C0392B" stroke-width="2"/>
  <!-- Arrow from center to position -->
  <path d="M 152,208 L 183,208" stroke="#C0392B" stroke-width="1.5"/>
  <polygon points="180,205 187,208 180,211" fill="#C0392B"/>

  <text x="152" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-weight="bold">Moves the ENTIRE signal</text>
  <text x="152" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E">to a position between L and R</text>

  <!-- RIGHT PANEL: Balance -->
  <rect x="310" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#3D8B37" stroke-width="1.5"/>
  <rect x="310" y="45" width="275" height="30" fill="#3D8B37" rx="6"/>
  <rect x="310" y="65" width="275" height="10" fill="#3D8B37"/>
  <text x="447" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#F5EDE3">Balance</text>

  <!-- Stereo source -->
  <text x="447" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3D8B37">Stereo source (two signals)</text>
  <!-- Two dots representing stereo -->
  <circle cx="420" cy="125" r="14" fill="#3D8B37" fill-opacity="0.15" stroke="#3D8B37" stroke-width="2"/>
  <text x="420" y="129" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" font-weight="bold">L</text>
  <circle cx="475" cy="125" r="14" fill="#3D8B37" fill-opacity="0.15" stroke="#3D8B37" stroke-width="2"/>
  <text x="475" y="129" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" font-weight="bold">R</text>

  <!-- Arrow showing adjustment -->
  <path d="M 447,142 L 447,160" stroke="#3D8B37" stroke-width="1.5"/>
  <polygon points="444,157 447,164 450,157" fill="#3D8B37"/>
  <text x="447" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" font-style="italic">Adjusts relative levels</text>

  <!-- Level bars -->
  <rect x="345" y="188" width="205" height="40" fill="#E8D5C0" fill-opacity="0.5" rx="6" stroke="#E8D5C0" stroke-width="1"/>
  <!-- L level bar (reduced) -->
  <rect x="365" y="196" width="50" height="8" fill="#3D8B37" fill-opacity="0.3" rx="2"/>
  <rect x="365" y="196" width="30" height="8" fill="#3D8B37" fill-opacity="0.7" rx="2"/>
  <text x="355" y="204" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37" font-weight="bold">L</text>
  <!-- R level bar (full) -->
  <rect x="365" y="210" width="50" height="8" fill="#3D8B37" fill-opacity="0.3" rx="2"/>
  <rect x="365" y="210" width="50" height="8" fill="#3D8B37" fill-opacity="0.7" rx="2"/>
  <text x="355" y="218" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37" font-weight="bold">R</text>
  <!-- Slider icon -->
  <rect x="460" y="195" width="60" height="24" fill="white" fill-opacity="0.6" rx="4" stroke="#3D8B37" stroke-width="1"/>
  <line x1="468" y1="207" x2="512" y2="207" stroke="#E8D5C0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="498" cy="207" r="5" fill="#3D8B37"/>

  <text x="447" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" font-weight="bold">Adjusts L/R VOLUME ratio</text>
  <text x="447" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37">of an already-stereo signal</text>
</svg>