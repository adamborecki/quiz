<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Filter Slope Comparison</text>
  <!-- Grid area -->
  <rect x="80" y="40" width="490" height="210" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Axes -->
  <line x1="80" y1="80" x2="570" y2="80" stroke="#E8D5C0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="250" x2="570" y2="250" stroke="#2D2D2D" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="250" stroke="#2D2D2D" stroke-width="1"/>
  <!-- 0dB reference -->
  <line x1="80" y1="80" x2="570" y2="80" stroke="#5C3D2E" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="72" y="84" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#2D2D2D">0 dB</text>
  <text x="72" y="170" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#2D2D2D">-24 dB</text>
  <text x="72" y="250" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#2D2D2D">-48 dB</text>
  <!-- Cutoff frequency marker -->
  <line x1="350" y1="40" x2="350" y2="255" stroke="#5C3D2E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="350" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E" font-weight="bold">Cutoff Frequency</text>
  <!-- X-axis labels -->
  <text x="130" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">Low</text>
  <text x="500" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">High</text>
  <text x="325" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C3D2E">Frequency →</text>
  <!-- Gentle slope: 6 dB/oct (dashed) -->
  <path d="M 80,240 C 140,235 200,225 250,200 C 290,180 320,130 350,80 L 570,80" fill="none" stroke="#3D8B37" stroke-width="2.5" stroke-dasharray="8,5" stroke-linecap="round"/>
  <!-- Steep slope: 24 dB/oct (solid) -->
  <path d="M 80,248 C 180,248 280,247 320,240 C 335,230 345,150 350,80 L 570,80" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legend -->
  <rect x="390" y="120" width="160" height="60" fill="#F5EDE3" fill-opacity="0.9" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <line x1="400" y1="140" x2="430" y2="140" stroke="#3D8B37" stroke-width="2.5" stroke-dasharray="8,5"/>
  <text x="438" y="144" font-family="system-ui, sans-serif" font-size="12" fill="#3D8B37" font-weight="bold">6 dB/oct (gentle)</text>
  <line x1="400" y1="165" x2="430" y2="165" stroke="#C0392B" stroke-width="2.5"/>
  <text x="438" y="169" font-family="system-ui, sans-serif" font-size="12" fill="#C0392B" font-weight="bold">24 dB/oct (steep)</text>
</svg>