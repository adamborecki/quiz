<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Master Limiter &amp; Gain Structure</text>

  <!-- LEFT PANEL: Good Gain Structure -->
  <rect x="15" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#3D8B37" stroke-width="1.5"/>
  <text x="152" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3D8B37">Good Gain Structure</text>
  <text x="152" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37">Limiter not compressing</text>

  <!-- Ceiling line -->
  <line x1="30" y1="95" x2="275" y2="95" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="35" y="90" font-family="system-ui, sans-serif" font-size="9" fill="#999">Ceiling (0 dB)</text>

  <!-- Center line -->
  <line x1="30" y1="175" x2="275" y2="175" stroke="#E8D5C0" stroke-width="0.5"/>

  <!-- Waveform with headroom - peaks well below ceiling -->
  <path d="M 35,175 C 40,172 45,160 50,150 C 55,140 60,165 65,178 C 70,188 75,172 80,160
  C 85,145 90,125 95,115 C 100,125 105,210 110,225 C 115,210 120,135 125,120
  C 130,135 135,195 140,205 C 145,195 150,160 155,150
  C 160,140 165,160 170,170 C 175,178 180,165 185,155
  C 190,145 195,165 200,175 C 205,180 210,165 215,155
  C 220,130 225,115 230,110 C 235,115 240,235 245,245
  C 250,235 255,120 260,110 C 265,120 270,165 275,175" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>

  <!-- Headroom arrow -->
  <line x1="240" y1="95" x2="240" y2="110" stroke="#3D8B37" stroke-width="1.5"/>
  <polygon points="237,97 240,92 243,97" fill="#3D8B37"/>
  <polygon points="237,108 240,113 243,108" fill="#3D8B37"/>
  <text x="255" y="105" font-family="system-ui, sans-serif" font-size="8" fill="#3D8B37">Headroom</text>

  <!-- GR meter showing 0 -->
  <rect x="35" y="250" width="80" height="16" fill="#eee" rx="2" stroke="#ccc" stroke-width="0.5"/>
  <text x="75" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37" font-weight="bold">GR: 0 dB</text>
  <text x="150" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37">✓ No compression applied</text>

  <!-- RIGHT PANEL: Bad Gain Structure -->
  <rect x="310" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#C0392B" stroke-width="1.5"/>
  <text x="447" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#C0392B">Level Too Hot</text>
  <text x="447" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C0392B">Limiter compressing your mix</text>

  <!-- Ceiling line -->
  <line x1="325" y1="95" x2="570" y2="95" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="330" y="90" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">Ceiling (0 dB)</text>

  <!-- Center line -->
  <line x1="325" y1="175" x2="570" y2="175" stroke="#E8D5C0" stroke-width="0.5"/>

  <!-- Waveform smashed into ceiling -->
  <path d="M 330,175 C 335,170 340,145 345,125 C 350,105 355,150 360,178 C 365,195 370,170 375,140
  C 380,115 385,95 390,95 C 395,95 400,250 405,255 C 410,250 415,95 420,95
  C 425,95 430,215 435,230 C 440,215 445,130 450,115
  C 455,100 460,140 465,160 C 470,175 475,145 480,125
  C 485,110 490,150 495,170 C 500,178 505,140 510,120
  C 515,95 520,95 525,95 C 530,95 535,255 540,260
  C 545,255 550,95 555,95 C 560,95 565,155 570,175" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>

  <!-- Compression zones highlighted -->
  <rect x="385" y="88" width="40" height="12" fill="#C0392B" fill-opacity="0.2" rx="2"/>
  <rect x="415" y="88" width="10" height="12" fill="#C0392B" fill-opacity="0.2" rx="2"/>
  <rect x="510" y="88" width="50" height="12" fill="#C0392B" fill-opacity="0.2" rx="2"/>
  <text x="447" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">Peaks hitting ceiling ↑</text>

  <!-- GR meter showing compression -->
  <rect x="330" y="250" width="80" height="16" fill="#C0392B" fill-opacity="0.15" rx="2" stroke="#C0392B" stroke-width="0.5"/>
  <rect x="330" y="250" width="45" height="16" fill="#C0392B" fill-opacity="0.4" rx="2"/>
  <text x="370" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B" font-weight="bold">GR: −6 dB</text>
  <text x="445" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">✗ Limiter working hard!</text>
</svg>
