<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Compression: Before &amp; After</text>

  <!-- TOP: Before Compression -->
  <rect x="30" y="45" width="540" height="155" fill="white" fill-opacity="0.5" rx="6" stroke="#E8D5C0" stroke-width="1"/>
  <text x="55" y="65" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#5C3D2E">Before Compression</text>
  <!-- Center line -->
  <line x1="40" y1="125" x2="560" y2="125" stroke="#E8D5C0" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Waveform - big dynamic range -->
  <path d="M 50,125 C 55,125 58,120 62,110 C 66,100 70,125 74,140 C 78,150 82,125 86,115 C 90,105 94,130 98,125
  C 102,120 106,80 110,60 C 114,80 118,170 122,185 C 126,170 130,75 134,55 C 138,75 142,175 146,190 C 150,175 154,80 158,65
  C 162,80 166,160 170,170 C 174,160 178,100 182,90 C 186,100 190,145 194,125
  C 198,110 202,125 206,130 C 210,135 214,120 218,125
  C 222,125 226,115 230,105 C 234,95 238,130 242,145 C 246,155 250,125 254,110
  C 258,100 262,60 266,45 C 270,60 274,180 278,195 C 282,180 286,55 290,40 C 294,55 298,185 302,195
  C 306,185 310,70 314,55 C 318,70 322,165 326,175 C 330,165 334,95 338,85 C 342,95 346,140 350,125
  C 354,110 358,125 362,130 C 366,125 370,120 374,115
  C 378,110 382,125 386,130 C 390,135 394,120 398,110 C 402,100 406,75 410,65 C 414,75 418,155 422,170
  C 426,155 430,80 434,70 C 438,80 442,150 446,160 C 450,150 454,100 458,90 C 462,100 466,130 470,125
  C 474,120 478,125 482,125 C 486,125 490,120 494,115 C 498,110 502,130 506,135 C 510,140 514,125 518,120
  C 522,115 526,125 530,125 C 534,125 538,122 542,120 C 546,122 550,125 555,125"
  fill="none" stroke="#5C3D2E" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Dynamic range arrow (big) -->
  <line x1="565" y1="42" x2="565" y2="193" stroke="#C0392B" stroke-width="2"/>
  <polygon points="562,45 565,38 568,45" fill="#C0392B"/>
  <polygon points="562,190 565,197 568,190" fill="#C0392B"/>
  <text x="555" y="120" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#C0392B" transform="rotate(-90,555,120)">Large dynamic range</text>

  <!-- Arrow between panels -->
  <line x1="300" y1="205" x2="300" y2="230" stroke="#5C3D2E" stroke-width="2"/>
  <polygon points="296,227 300,236 304,227" fill="#5C3D2E"/>
  <text x="330" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E" font-weight="bold">Compressed</text>

  <!-- BOTTOM: After Compression -->
  <rect x="30" y="240" width="540" height="145" fill="white" fill-opacity="0.5" rx="6" stroke="#E8D5C0" stroke-width="1"/>
  <text x="55" y="260" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3D8B37">After Compression</text>
  <!-- Center line -->
  <line x1="40" y1="315" x2="560" y2="315" stroke="#E8D5C0" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Waveform - reduced dynamic range, peaks reduced, quiet parts louder -->
  <path d="M 50,315 C 55,315 58,310 62,305 C 66,298 70,315 74,325 C 78,332 82,315 86,308 C 90,300 94,318 98,315
  C 102,312 106,290 110,280 C 114,290 118,340 122,350 C 126,340 130,288 134,278 C 138,288 142,342 146,352 C 150,342 154,292 158,285
  C 162,292 166,335 170,340 C 174,335 178,300 182,295 C 186,300 190,328 194,315
  C 198,305 202,315 206,318 C 210,320 214,312 218,315
  C 222,315 226,308 230,302 C 234,296 238,318 242,328 C 246,335 250,315 254,305
  C 258,298 262,282 266,275 C 270,282 274,345 278,352 C 282,345 286,280 290,272 C 294,280 298,348 302,352
  C 306,348 310,288 314,278 C 318,288 322,338 326,342 C 330,338 334,298 338,292 C 342,298 346,325 350,315
  C 354,305 358,315 362,318 C 366,315 370,312 374,308
  C 378,305 382,315 386,318 C 390,322 394,312 398,305 C 402,298 406,286 410,282 C 414,286 418,335 422,340
  C 426,335 430,292 434,288 C 438,292 442,332 446,338 C 450,332 454,300 458,295 C 462,300 466,318 470,315
  C 474,312 478,315 482,315 C 486,315 490,312 494,308 C 498,305 502,318 506,322 C 510,325 514,315 518,312
  C 522,308 526,315 530,315 C 534,315 538,313 542,312 C 546,313 550,315 555,315"
  fill="none" stroke="#3D8B37" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Dynamic range arrow (small) -->
  <line x1="565" y1="274" x2="565" y2="350" stroke="#3D8B37" stroke-width="2"/>
  <polygon points="562,277 565,270 568,277" fill="#3D8B37"/>
  <polygon points="562,347 565,354 568,347" fill="#3D8B37"/>
  <text x="555" y="318" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" transform="rotate(-90,555,318)">Reduced range</text>

  <!-- Annotations -->
  <rect x="340" y="355" width="225" height="22" fill="#3D8B37" fill-opacity="0.1" rx="4"/>
  <text x="452" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3D8B37" font-weight="bold">Peaks reduced, quiet parts louder</text>
</svg>