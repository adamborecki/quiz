<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">EQ vs Dynamics Processing</text>
  <text x="300" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E">Two different domains of audio control</text>

  <!-- LEFT PANEL: EQ -->
  <rect x="25" y="65" width="260" height="210" fill="white" fill-opacity="0.6" rx="8" stroke="#5C3D2E" stroke-width="2"/>
  <rect x="25" y="65" width="260" height="40" fill="#5C3D2E" rx="8"/>
  <rect x="25" y="95" width="260" height="10" fill="#5C3D2E"/>
  <text x="155" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#F5EDE3">EQ</text>
  <!-- Frequency spectrum icon -->
  <rect x="70" y="125" width="170" height="80" fill="#F5EDE3" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Spectrum bars -->
  <rect x="85" y="170" width="12" height="30" fill="#5C3D2E" fill-opacity="0.3" rx="2"/>
  <rect x="103" y="155" width="12" height="45" fill="#5C3D2E" fill-opacity="0.4" rx="2"/>
  <rect x="121" y="138" width="12" height="62" fill="#5C3D2E" fill-opacity="0.6" rx="2"/>
  <rect x="139" y="145" width="12" height="55" fill="#5C3D2E" fill-opacity="0.8" rx="2"/>
  <rect x="157" y="155" width="12" height="45" fill="#5C3D2E" fill-opacity="0.5" rx="2"/>
  <rect x="175" y="165" width="12" height="35" fill="#5C3D2E" fill-opacity="0.35" rx="2"/>
  <rect x="193" y="178" width="12" height="22" fill="#5C3D2E" fill-opacity="0.25" rx="2"/>
  <text x="155" y="216" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E">Low → Frequency → High</text>
  <!-- Label -->
  <text x="155" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#5C3D2E">Responds to:</text>
  <text x="155" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D">Frequency</text>

  <!-- VS divider -->
  <circle cx="300" cy="175" r="18" fill="#E8D5C0" stroke="#5C3D2E" stroke-width="1.5"/>
  <text x="300" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#5C3D2E">vs</text>

  <!-- RIGHT PANEL: Dynamics -->
  <rect x="315" y="65" width="260" height="210" fill="white" fill-opacity="0.6" rx="8" stroke="#3D8B37" stroke-width="2"/>
  <rect x="315" y="65" width="260" height="40" fill="#3D8B37" rx="8"/>
  <rect x="315" y="95" width="260" height="10" fill="#3D8B37"/>
  <text x="445" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#F5EDE3">Dynamics</text>
  <!-- Waveform icon -->
  <rect x="360" y="125" width="170" height="80" fill="#F5EDE3" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Waveform drawing -->
  <path d="M 370,165 C 375,165 378,155 382,145 C 386,155 390,175 394,185 C 398,175 402,140 406,130 C 410,140 414,190 418,195 C 422,190 426,135 430,125 C 434,135 438,190 442,195 C 446,185 450,145 454,140 C 458,150 462,175 466,180 C 470,175 474,155 478,150 C 482,155 486,162 490,165 C 494,168 498,165 502,165 C 506,165 510,162 514,160 C 518,162 520,165 522,165" fill="none" stroke="#3D8B37" stroke-width="2" stroke-linecap="round"/>
  <!-- Amplitude arrow -->
  <line x1="355" y1="130" x2="355" y2="195" stroke="#3D8B37" stroke-width="1.5"/>
  <polygon points="352,133 355,125 358,133" fill="#3D8B37"/>
  <polygon points="352,192 355,200 358,192" fill="#3D8B37"/>
  <text x="445" y="216" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37">Amplitude over time →</text>
  <!-- Label -->
  <text x="445" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3D8B37">Responds to:</text>
  <text x="445" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D">Amplitude (loudness)</text>
</svg>