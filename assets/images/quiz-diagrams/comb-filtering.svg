<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Comb Filtering</text>

  <!-- TOP: Two overlapping signals in time domain -->
  <rect x="30" y="35" width="540" height="75" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <text x="45" y="50" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#5C3D2E">Time Domain: Original + Delayed Copy</text>
  <!-- Original signal -->
  <path d="M 40,75 C 55,75 60,55 70,45 C 80,55 85,95 95,105 C 105,95 110,55 120,45 C 130,55 135,95 145,105 C 155,95 160,55 170,45 C 180,55 185,95 195,105 C 205,95 210,55 220,45 C 230,55 235,95 245,105 C 255,95 260,55 270,45 C 280,55 285,95 295,105 C 305,95 310,55 320,45 C 330,55 335,95 345,105 C 355,95 360,55 370,45 C 380,55 385,95 395,105 C 405,95 410,55 420,45 C 430,55 435,95 445,105 C 455,95 460,55 470,45 C 480,55 485,95 495,105 C 505,95 510,75 515,75 C 520,75 525,75 530,75" fill="none" stroke="#3D8B37" stroke-width="1.5" opacity="0.8"/>
  <!-- Delayed copy (shifted right ~10px) -->
  <path d="M 55,75 C 70,75 75,55 85,45 C 95,55 100,95 110,105 C 120,95 125,55 135,45 C 145,55 150,95 160,105 C 170,95 175,55 185,45 C 195,55 200,95 210,105 C 220,95 225,55 235,45 C 245,55 250,95 260,105 C 270,95 275,55 285,45 C 295,55 300,95 310,105 C 320,95 325,55 335,45 C 345,55 350,95 360,105 C 370,95 375,55 385,45 C 395,55 400,95 410,105 C 420,95 425,55 435,45 C 445,55 450,95 460,105 C 470,95 475,55 485,45 C 495,55 500,95 510,105 C 520,95 525,75 530,75 C 535,75 540,75 545,75" fill="none" stroke="#C0392B" stroke-width="1.5" opacity="0.8" stroke-dasharray="5,3"/>
  <!-- Legend -->
  <line x1="380" y1="44" x2="405" y2="44" stroke="#3D8B37" stroke-width="1.5"/>
  <text x="410" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37">Original</text>
  <line x1="450" y1="44" x2="475" y2="44" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="480" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">Delayed copy</text>

  <!-- Arrow down -->
  <text x="300" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-weight="bold">When combined, some frequencies cancel out:</text>
  <line x1="300" y1="128" x2="300" y2="140" stroke="#5C3D2E" stroke-width="1.5"/>
  <polygon points="297,137 300,144 303,137" fill="#5C3D2E"/>

  <!-- BOTTOM: Frequency response showing comb pattern -->
  <rect x="30" y="148" width="540" height="135" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <text x="45" y="163" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#5C3D2E">Frequency Response: Comb Filter Pattern</text>
  <!-- Axes -->
  <line x1="50" y1="270" x2="560" y2="270" stroke="#2D2D2D" stroke-width="1"/>
  <line x1="50" y1="168" x2="50" y2="270" stroke="#2D2D2D" stroke-width="1"/>
  <text x="305" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E">Frequency →</text>
  <text x="42" y="220" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#2D2D2D">dB</text>
  <!-- 0dB reference -->
  <line x1="50" y1="195" x2="560" y2="195" stroke="#E8D5C0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="42" y="199" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="#2D2D2D">0</text>

  <!-- Comb filter curve with alternating peaks and nulls -->
  <path d="M 55,195 C 60,195 63,190 68,180 C 73,170 78,175 83,195 C 88,230 90,260 95,268 C 100,260 102,225 107,195 C 112,175 115,172 120,180 C 125,190 128,195 133,195 C 138,195 141,190 146,180 C 151,170 156,175 161,195 C 166,230 168,260 173,268 C 178,260 180,225 185,195 C 190,175 193,172 198,180 C 203,190 206,195 211,195 C 216,195 219,190 224,180 C 229,170 234,175 239,195 C 244,230 246,260 251,268 C 256,260 258,225 263,195 C 268,175 271,172 276,180 C 281,190 284,195 289,195 C 294,195 297,190 302,180 C 307,170 312,175 317,195 C 322,230 324,260 329,268 C 334,260 336,225 341,195 C 346,175 349,172 354,180 C 359,190 362,195 367,195 C 372,195 375,190 380,180 C 385,170 390,175 395,195 C 400,230 402,260 407,268 C 412,260 414,225 419,195 C 424,175 427,172 432,180 C 437,190 440,195 445,195 C 450,195 453,190 458,180 C 463,170 468,175 473,195 C 478,230 480,260 485,268 C 490,260 492,225 497,195 C 502,175 505,172 510,180 C 515,190 518,195 523,195 C 528,195 533,192 538,188 C 543,184 548,190 555,195" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>

  <!-- Null point labels -->
  <line x1="95" y1="268" x2="95" y2="275" stroke="#C0392B" stroke-width="1"/>
  <line x1="173" y1="268" x2="173" y2="275" stroke="#C0392B" stroke-width="1"/>
  <line x1="251" y1="268" x2="251" y2="275" stroke="#C0392B" stroke-width="1"/>
  <!-- Null annotation -->
  <text x="173" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B" font-weight="bold">Nulls (phase cancellation)</text>
  <!-- Peak annotation -->
  <text x="430" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#3D8B37" font-weight="bold">Peaks (reinforcement)</text>

  <!-- Looks like teeth of a comb annotation -->
  <path d="M 475,175 C 475,177 475,180 473,182" fill="none" stroke="#5C3D2E" stroke-width="0.8"/>
</svg>