<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <rect width="600" height="250" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Stereo Audio: Two Channels</text>

  <!-- Stereo bracket -->
  <text x="24" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#5C3D2E" transform="rotate(-90,24,140)">STEREO</text>
  <path d="M 38,55 C 30,55 28,55 28,65 L 28,210 C 28,220 30,220 38,220" fill="none" stroke="#5C3D2E" stroke-width="2"/>

