<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Bandpass Filter</text>
  <!-- Grid area -->
  <rect x="70" y="40" width="510" height="210" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Axes -->
  <line x1="70" y1="250" x2="580" y2="250" stroke="#2D2D2D" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="70" y2="250" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="30" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C3D2E" transform="rotate(-90,30,150)">Level (dB)</text>
  <text x="325" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C3D2E">Frequency →</text>
  <!-- 0dB reference -->
  <line x1="70" y1="70" x2="580" y2="70" stroke="#E8D5C0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="62" y="74" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">0 dB</text>
  <!-- Attenuated region fills -->
  <path d="M 70,245 C 120,245 150,240 190,220 C 210,205 220,160 230,100 L 230,250 L 70,250 Z" fill="#C0392B" fill-opacity="0.08"/>
  <path d="M 390,100 C 400,160 410,205 430,220 C 470,240 500,245 580,245 L 580,250 L 390,250 Z" fill="#C0392B" fill-opacity="0.08"/>
  <!-- Pass region fill -->
  <path d="M 230,100 C 260,60 290,55 310,55 C 330,55 360,60 390,100 L 390,250 L 230,250 Z" fill="#3D8B37" fill-opacity="0.08"/>
  <!-- Bandpass curve -->
  <path d="M 70,245 C 120,245 150,240 190,220 C 210,205 220,160 230,100 C 260,60 290,55 310,55 C 330,55 360,60 390,100 C 400,160 410,205 430,220 C 470,240 500,245 580,245" fill="none" stroke="#5C3D2E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Low cutoff line -->
  <line x1="230" y1="45" x2="230" y2="255" stroke="#5C3D2E" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="230" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-weight="bold">Low cutoff</text>
  <!-- High cutoff line -->
  <line x1="390" y1="45" x2="390" y2="255" stroke="#5C3D2E" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="390" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E" font-weight="bold">High cutoff</text>
  <!-- Labels -->
  <text x="140" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C0392B" font-weight="bold">Attenuated</text>
  <text x="310" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D8B37" font-weight="bold">Passes</text>
  <text x="310" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37">through</text>
  <text x="500" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C0392B" font-weight="bold">Attenuated</text>
  <!-- Center frequency arrow -->
  <line x1="310" y1="55" x2="310" y2="42" stroke="#5C3D2E" stroke-width="1.2"/>
  <polygon points="307,45 310,38 313,45" fill="#5C3D2E"/>
  <text x="310" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5C3D2E">Center freq</text>
</svg>