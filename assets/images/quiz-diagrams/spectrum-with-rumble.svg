<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="specGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3D2E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5C3D2E" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Frequency Spectrum with Low-End Rumble</text>
  <!-- Grid area -->
  <rect x="70" y="40" width="510" height="210" fill="white" fill-opacity="0.5" rx="4" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Axes -->
  <line x1="70" y1="250" x2="580" y2="250" stroke="#2D2D2D" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="70" y2="250" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="30" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5C3D2E" transform="rotate(-90,30,150)">Level</text>
  <!-- Frequency labels -->
  <text x="70" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">20</text>
  <text x="145" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">80</text>
  <text x="230" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">250</text>
  <text x="340" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">1k</text>
  <text x="460" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">5k</text>
  <text x="560" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2D2D2D">20k</text>
  <text x="325" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5C3D2E">Frequency (Hz)</text>
  <!-- Rumble region (red shading) -->
  <path d="M 70,140 C 85,120 100,110 115,115 C 130,120 140,145 145,155 L 145,250 L 70,250 Z" fill="#C0392B" fill-opacity="0.15"/>
  <!-- Main spectrum fill -->
  <path d="M 145,155 C 160,140 180,100 200,85 C 220,70 240,75 270,80 C 300,85 320,90 350,100 C 380,110 420,130 450,150 C 480,170 520,200 550,220 C 565,230 575,240 580,245 L 580,250 L 145,250 Z" fill="url(#specGrad)"/>
  <!-- Rumble spectrum area -->
  <path d="M 70,140 C 85,120 100,110 115,115 C 130,120 140,145 145,155" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Main spectrum line -->
  <path d="M 145,155 C 160,140 180,100 200,85 C 220,70 240,75 270,80 C 300,85 320,90 350,100 C 380,110 420,130 450,150 C 480,170 520,200 550,220 C 565,230 575,240 580,245" fill="none" stroke="#5C3D2E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 80Hz cutoff line -->
  <line x1="145" y1="42" x2="145" y2="255" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="145" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C0392B" font-weight="bold">~80 Hz</text>
  <!-- Rumble label with arrow -->
  <rect x="155" y="58" width="250" height="34" fill="#C0392B" fill-opacity="0.1" rx="4" stroke="#C0392B" stroke-width="1"/>
  <text x="280" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C0392B" font-weight="bold">Rumble &amp; noise below ~80Hz</text>
  <text x="280" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C0392B">Remove with high-pass filter!</text>
  <!-- Arrow from label to rumble region -->
  <path d="M 155,80 L 120,130" stroke="#C0392B" stroke-width="1.2" fill="none"/>
  <polygon points="122,126 117,134 126,131" fill="#C0392B"/>
</svg>