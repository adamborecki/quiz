<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#F5EDE3" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">Limiter Can Mask Problems</text>

  <!-- LEFT PANEL: Without Limiter -->
  <rect x="15" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#3D8B37" stroke-width="1.5"/>
  <text x="152" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3D8B37">Without Limiter</text>
  <!-- Center line -->
  <line x1="30" y1="160" x2="275" y2="160" stroke="#E8D5C0" stroke-width="0.5"/>
  <!-- Waveform with visible dynamic variation -->
  <path d="M 35,160 C 40,158 45,150 50,145 C 55,140 60,155 65,162 C 70,170 75,160 80,155
  C 85,145 90,120 95,100 C 100,120 105,195 110,210 C 115,195 120,130 125,115
  C 130,130 135,180 140,190 C 145,180 150,150 155,145
  C 160,140 165,155 170,160 C 175,165 180,155 185,150
  C 190,145 195,160 200,165 C 205,170 210,158 215,155
  C 220,115 225,90 230,75 C 235,90 240,230 245,245
  C 250,230 255,100 260,85 C 265,100 270,155 275,160" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>
  <!-- Problem callout with arrow -->
  <rect x="35" y="222" width="140" height="20" fill="#3D8B37" fill-opacity="0.15" rx="3" stroke="#3D8B37" stroke-width="1"/>
  <text x="105" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3D8B37" font-weight="bold">Problems visible!</text>
  <!-- Arrow pointing to quiet section -->
  <path d="M 105,222 L 155,190" stroke="#3D8B37" stroke-width="1.2" fill="none"/>
  <polygon points="152,193 158,187 150,189" fill="#3D8B37"/>
  <!-- Dynamic variation labels -->
  <text x="95" y="92" font-family="system-ui, sans-serif" font-size="9" fill="#5C3D2E">Loud</text>
  <text x="160" y="175" font-family="system-ui, sans-serif" font-size="9" fill="#5C3D2E">Quiet</text>
  <text x="230" y="68" font-family="system-ui, sans-serif" font-size="9" fill="#5C3D2E">Loud</text>
  <!-- Dynamic range arrow -->
  <line x1="25" y1="80" x2="25" y2="240" stroke="#3D8B37" stroke-width="1.5"/>
  <polygon points="22,83 25,75 28,83" fill="#3D8B37"/>
  <polygon points="22,237 25,245 28,237" fill="#3D8B37"/>

  <!-- RIGHT PANEL: With Limiter -->
  <rect x="310" y="45" width="275" height="235" fill="white" fill-opacity="0.5" rx="6" stroke="#C0392B" stroke-width="1.5"/>
  <text x="447" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#C0392B">With Limiter</text>
  <!-- Center line -->
  <line x1="325" y1="160" x2="570" y2="160" stroke="#E8D5C0" stroke-width="0.5"/>
  <!-- Waveform squashed and loud -->
  <path d="M 330,160 C 335,155 340,140 345,130 C 350,120 355,150 360,165 C 365,175 370,160 375,145
  C 380,130 385,105 390,90 C 395,105 400,210 405,225 C 410,210 415,110 420,95
  C 425,110 430,200 435,210 C 440,200 445,140 450,130
  C 455,120 460,145 465,155 C 470,165 475,145 480,135
  C 485,125 490,150 495,160 C 500,165 505,145 510,135
  C 515,105 520,85 525,80 C 530,85 535,235 540,240
  C 545,235 550,90 555,80 C 560,90 565,150 570,160" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>
  <!-- Limiter ceiling lines -->
  <line x1="325" y1="80" x2="570" y2="80" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="325" y1="240" x2="570" y2="240" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Problem callout -->
  <rect x="345" y="222" width="205" height="36" fill="#C0392B" fill-opacity="0.1" rx="3" stroke="#C0392B" stroke-width="1"/>
  <text x="447" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C0392B" font-weight="bold">Problems hidden!</text>
  <text x="447" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#C0392B">Everything sounds loud and similar</text>
  <!-- Compressed range arrow -->
  <line x1="320" y1="82" x2="320" y2="238" stroke="#C0392B" stroke-width="1.5"/>
  <polygon points="317,85 320,78 323,85" fill="#C0392B"/>
  <polygon points="317,235 320,242 323,235" fill="#C0392B"/>
</svg>